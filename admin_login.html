<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LUMIÈRE | Admin Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Tenor+Sans&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B132B; --gold: #C5A059; --espresso: #2C1810; }
        body { background: var(--navy); font-family: 'Tenor Sans', sans-serif; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(197, 160, 89, 0.2); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="glass-panel w-full max-w-md p-12 text-center">
        <h1 class="font-[Cinzel] text-3xl tracking-[0.4em] mb-2">LUMIÈRE</h1>
        <p class="text-[10px] tracking-[0.3em] uppercase text-[#C5A059] mb-12">Admin Portal</p>
        <form id="loginForm" class="space-y-6 text-left">
            <input type="email" id="email" class="w-full p-4 bg-transparent border border-[#2C1810] text-sm" placeholder="ADMIN EMAIL" required>
            <input type="password" id="password" class="w-full p-4 bg-transparent border border-[#2C1810] text-sm" placeholder="PASSWORD" required>
            <button type="submit" class="w-full bg-[#C5A059] text-[#0B132B] py-4 font-bold uppercase tracking-widest hover:bg-white transition">
               AUTHENTICATE
            </button>
        </form>
    </div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            // FIXED: Pointing to Port 5005
            const res = await fetch('http://localhost:5005/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (res.status === 200 && data.role === 'admin') {
                localStorage.setItem('token', data.token);
                window.location.href = 'admin_management.html';
            } else {
                alert("Access Denied: " + (data.error || "Invalid Credentials"));
            }
        } catch (err) {
            alert("Server connection failed. Make sure your backend is running on Port 5005.");
        }
    });
</script>
</body>
</html>
