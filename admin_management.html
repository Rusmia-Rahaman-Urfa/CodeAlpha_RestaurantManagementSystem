<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>LUMIÈRE | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Tenor+Sans&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B132B; --gold: #C5A059; --espresso: #2C1810; --cream: #FDFCF0; }
        body { background: var(--cream); font-family: 'Tenor Sans', sans-serif; }
        .management-card { background: white; border: 1.5px solid var(--espresso); box-shadow: 10px 10px 0px var(--navy); }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 bg-[#0B132B] text-white p-8 border-r-2 border-[#C5A059]">
        <h2 class="font-[Cinzel] text-xl mb-16">LUMIÈRE</h2>
        <nav class="space-y-8 text-[10px] uppercase font-bold tracking-widest">
            <a href="#" class="text-[#C5A059] block">Inventory</a>
            <a href="#" class="opacity-50 block">Orders</a>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <h1 class="text-4xl font-[Cinzel] mb-12">Live Inventory</h1>
        <div class="management-card p-10">
            <table class="w-full text-left">
                <thead class="text-[10px] uppercase text-gray-400">
                    <tr><th>Item</th><th>Stock</th><th>Status</th></tr>
                </thead>
                <tbody id="inventoryBody" class="text-sm">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadInventory() {
            const token = localStorage.getItem('token');
            const res = await fetch('http://localhost:5002/api/admin/inventory', {
                headers: { 'Authorization': token }
            });
            if (res.status !== 200) return window.location.href = 'admin_login.html';
            
            const items = await res.json();
            const body = document.getElementById('inventoryBody');
            body.innerHTML = items.map(item => `
                <tr class="border-b">
                    <td class="py-4 font-bold">${item.itemName}</td>
                    <td class="py-4">${item.stockQuantity} ${item.unit}</td>
                    <td class="py-4">
                        <span class="px-3 py-1 text-[8px] font-bold uppercase rounded-full ${item.stockQuantity < item.minLimit ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                            ${item.stockQuantity < item.minLimit ? 'Low' : 'Optimal'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }
        loadInventory();
    </script>
</body>
</html>
