<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LUMIÈRE | Admin Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Tenor+Sans&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B132B; --gold: #C5A059; --espresso: #2C1810; --cream: #FDFCF0; }
        body { background: var(--cream); font-family: 'Tenor Sans', sans-serif; }
        .management-card { background: white; border: 1.5px solid var(--espresso); box-shadow: 10px 10px 0px var(--navy); }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 bg-[#0B132B] text-white p-8 border-r-2 border-[#C5A059] flex flex-col fixed h-full">
        <h2 class="font-[Cinzel] text-xl mb-16 tracking-[0.2em] cursor-pointer" onclick="location.href='index.html'">LUMIÈRE</h2>
        <nav class="space-y-8 text-[10px] uppercase font-bold tracking-widest flex-1">
            <a href="admin_management.html" class="opacity-50 block hover:text-[#C5A059]">Inventory</a>
            <a href="admin_orders.html" class="text-[#C5A059] block">Orders</a>
            <a href="admin_reservations.html" class="opacity-50 block hover:text-[#C5A059]">Reservations</a>
            <hr class="border-[#C5A059]/20 my-4">
            <a href="index.html" class="opacity-50 block hover:text-[#C5A059]">View Website</a>
        </nav>
        <button onclick="logout()" class="mt-auto text-red-400 text-[10px] font-bold uppercase tracking-widest hover:underline">Log Out</button>
    </aside>

    <main class="flex-1 ml-64 p-12">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-[Cinzel]">Live Orders</h1>
            <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Kitchen Display</span>
        </header>

        <div class="management-card p-10">
            <table class="w-full text-left">
                <thead class="text-[10px] uppercase text-gray-400 border-b border-gray-100">
                    <tr><th class="pb-4">Order ID</th><th class="pb-4">Table</th><th class="pb-4">Items</th><th class="pb-4">Status</th></tr>
                </thead>
                <tbody id="ordersBody" class="text-sm"></tbody>
            </table>
        </div>
    </main>

<script>
    async function loadOrders() {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch('http://localhost:5005/api/admin/orders', {
                headers: { 'Authorization': token }
            });
            const orders = await res.json();
            document.getElementById('ordersBody').innerHTML = orders.map(o => `
                <tr class="border-b">
                    <td class="py-4 font-bold">#${o._id.slice(-5).toUpperCase()}</td>
                    <td class="py-4">${o.customerName || 'Guest'}</td>
                    <td class="py-4">${o.items}</td>
                    <td class="py-4">
                        <span class="px-3 py-1 text-[8px] font-bold uppercase rounded-full bg-amber-100 text-amber-600">${o.status}</span>
                    </td>
                </tr>
            `).join('');
        } catch (e) { console.error("Load failed", e); }
    }
    window.onload = loadOrders;
    function logout() { localStorage.removeItem('token'); window.location.href = 'admin_login.html'; }
</script>
</body>
</html>
